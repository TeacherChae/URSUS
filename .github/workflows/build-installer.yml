name: Build & Package URSUS

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: 'false'
        type: boolean

env:
  DOTNET_VERSION: '8.0.129'
  CONFIGURATION: 'Release'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore URSUS.sln

      - name: Run required test suite
        run: dotnet run --project src/URSUS.Tests/URSUS.Tests.csproj -c Release --no-restore

      - name: Build
        run: dotnet build URSUS.sln -c ${{ env.CONFIGURATION }} --no-restore

      - name: Verify and stage package payload
        shell: pwsh
        run: |
          python installer/verify_package_contract.py
          if ($LASTEXITCODE -ne 0) { throw "Packaging contract verification failed" }

          $manifest = Get-Content installer/package-manifest.json -Raw | ConvertFrom-Json
          $sourceRoot = Join-Path $PWD $manifest.artifactRoot
          $packageRoot = Join-Path $PWD "dist/package"
          if (Test-Path $packageRoot) { Remove-Item $packageRoot -Recurse -Force }
          New-Item -ItemType Directory -Path $packageRoot -Force | Out-Null

          foreach ($file in $manifest.requiredRuntimeFiles) {
            $source = Join-Path $sourceRoot $file
            $destination = Join-Path $packageRoot $file
            New-Item -ItemType Directory -Path (Split-Path -Parent $destination) -Force | Out-Null
            Copy-Item -LiteralPath $source -Destination $destination
          }
          Write-Host "Package payload staged from $($manifest.artifactRoot)."

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: URSUS-Release
          path: dist/package/
          if-no-files-found: error
          retention-days: 30

  installer:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: URSUS-Release
          path: bin/dist

      - name: Verify downloaded package payload
        shell: pwsh
        run: |
          python installer/verify_package_contract.py
          if ($LASTEXITCODE -ne 0) { throw "Downloaded package payload is incomplete" }

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          Write-Host "Inno Setup installed."

      - name: Create installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          }
          & $iscc installer/URSUS.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compilation failed" }

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $manifest = Get-Content installer/package-manifest.json -Raw | ConvertFrom-Json
          $sourceRoot = Join-Path $PWD $manifest.artifactRoot
          $staging = "dist/_staging"
          if (Test-Path $staging) { Remove-Item $staging -Recurse -Force }
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          foreach ($file in $manifest.requiredRuntimeFiles) {
            $source = Join-Path $sourceRoot $file
            $destination = Join-Path $staging $file
            New-Item -ItemType Directory -Path (Split-Path -Parent $destination) -Force | Out-Null
            Copy-Item -LiteralPath $source -Destination $destination
          }
          $sampleDir = Join-Path $staging "samples"
          New-Item -ItemType Directory -Path $sampleDir -Force | Out-Null
          foreach ($sample in $manifest.sampleFiles) {
            Copy-Item (Join-Path $PWD $sample) $sampleDir
          }
          Compress-Archive -Path "$staging/*" -DestinationPath "dist/URSUS_portable.zip" -Force
          Remove-Item -Recurse -Force $staging

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: URSUS-Installer
          path: |
            dist/URSUS_*_Setup.exe
            dist/URSUS_portable.zip
          retention-days: 30

  release:
    needs: installer
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          name: URSUS-Installer
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/URSUS_*_Setup.exe
            dist/URSUS_portable.zip
          draft: true
          generate_release_notes: true
