# ============================================================================
# URSUS Product Roadmap Seed
# Generated from Socratic Interview (Path B) — 2026-04-02
# ============================================================================

goal: >
  URSUS를 '건축 설계 초기 단계에서 대지의 모든 공간 데이터를 한 번에 분석하는
  원스톱 도구'로 발전시킨다. 학생(교육) 사용자를 최우선으로, 이후 건축 설계사무소
  실무자까지 확장한다.

constraints:
  - C# .NET 7.0 + Grasshopper 네이티브 플러그인 아키텍처 유지
  - RhinoCommon / Grasshopper SDK 의존성 범위 내에서 구현
  - v0.2.0 PRD (docs/260401_prd.md)의 7개 기능을 선행 완료한 뒤 확장
  - 데이터 소스는 공공 API (무료 또는 API 키 기반)로 한정
  - 전국 확장 시 데이터 소스 전략은 아직 미정 — 아키텍처만 유연하게 설계
  - Food4Rhino 배포 기준에 부합하는 패키징 구조

acceptance_criteria:
  # Phase 1 — v0.2.0 사용성 개선
  - "[AC-01][P0][v0.2.0] Setup.exe 실행 → API 키 입력 → 설치 완료, 3단계 이내"
  - "[AC-02][P0][v0.2.0] Solver 컴포넌트의 필수 외부 입력 = 0개 (API 키 자동 로드, DataSet 기본값)"
  - "[AC-03][P0][v0.2.0] adstrd_legald_mapping.json이 DLL에 내장되어 사용자가 파일 존재를 몰라도 동작"
  - "[AC-04][P1][v0.2.0] 결과 데이터를 CSV로 원클릭 내보내기 가능"
  - "[AC-05][P2][v0.2.0] 에러 메시지가 한글로 표시되며 해결 가이드 URL 포함"
  # Phase 2 — v0.3.0 데이터 확장 + 분석 + 교육
  - "[AC-10][P0][v0.3.0] 부동산/토지이용 데이터셋 추가 (지가, 용도지역, 건폐율 중 1종 이상)"
  - "[AC-11][P0][v0.3.0] 데이터 소스 추상화 레이어 도입 — 서울 열린데이터 외 다른 소스를 플러그인 방식으로 추가 가능"
  - "[AC-20][P1][v0.3.0] 사용자가 데이터셋별 가중치를 GH 슬라이더로 조절 가능 (균등 평균 → 커스텀 비중)"
  - "[AC-30][P1][v0.3.0] VworldApiParser의 서울 하드코딩 필터 제거, address 동적 입력 지원"
  - "[AC-41][P1][v0.3.0] 예제 GH 파일 제공 — Solver→Visualizer→Exporter 연결된 샘플"
  - "[AC-42][P2][v0.3.0] 데이터 해석 가이드 — 각 데이터셋의 의미, overlay 결과 읽는 법 문서화"
  # Phase 3 — v0.4.0 대시보드 + 전국 확장 + 배포
  - "[AC-21][P1][v0.4.0] 특정 대지 위치(Point3d)를 입력하면 종합 점수 + 항목별 점수를 반환하는 대시보드 컴포넌트"
  - "[AC-31][P1][v0.4.0] 데이터 제공 지역이면 어디든 분석 가능한 구조 (전국 법정동 경계는 VWorld로 커버)"
  - "[AC-40][P1][v0.4.0] Food4Rhino에 정식 등록 및 배포"
  # Phase 4 — v0.5.0 시계열 + 환경
  - "[AC-22][P2][v0.5.0] 연도별 추이 분석 — 동일 지역의 연도별 데이터를 비교하는 시계열 시각화"
  - "[AC-50][P2][v0.5.0] 환경/기후 데이터셋 추가 (일조량, 풍향, 대기질 중 1종 이상)"
  # Phase 5 — v0.6.0 생활 인프라
  - "[AC-51][P2][v0.6.0] 생활 인프라 데이터셋 추가 (편의시설, 공원, 병원 등 POI)"

ontology_schema:
  name: URSUSProductDomain
  description: URSUS 대지 분석 플러그인의 핵심 도메인 모델
  fields:
    - name: DataSource
      type: interface
      description: >
        데이터 소스 추상화. 각 API(서울 열린데이터, 공공데이터포털, 통계청 등)를
        동일한 인터페이스로 래핑하여 지역/소스 확장을 플러그인 방식으로 지원.
    - name: DataSet
      type: enum
      description: >
        지원 데이터셋 종류. 현재 4종(소득, 상주인구, 생활인구, 교통)에서
        부동산/환경/인프라로 확장.
    - name: WeightProfile
      type: object
      description: >
        데이터셋별 가중치 프로필. 사용자가 슬라이더로 조절한 비중을
        weighted overlay에 반영.
    - name: SiteScore
      type: object
      description: >
        특정 대지 위치의 종합 점수 + 항목별 점수. 대시보드 컴포넌트의 출력.
    - name: TimeSeriesResult
      type: object
      description: >
        연도별 추이 데이터. 동일 지역의 시간 축 비교를 위한 구조.
    - name: SolverResult
      type: record
      description: >
        기존 파이프라인 출력 (LegalCodes, Names, Geometries, Centroids, Areas, Values, UnionBoundary).

evaluation_principles:
  - name: student_first
    description: 학생이 15분 내에 설치부터 첫 시각화까지 도달할 수 있어야 한다
    weight: 0.30
  - name: data_extensibility
    description: 새 데이터셋/소스 추가가 기존 코드 변경 없이 가능한 구조여야 한다
    weight: 0.25
  - name: analysis_depth
    description: 단순 시각화를 넘어 대지 적합성 판단에 실질적 도움을 줘야 한다
    weight: 0.25
  - name: reliability
    description: API 장애, 캐시 미스, 데이터 누락 시에도 명확한 가이드를 제공해야 한다
    weight: 0.10
  - name: performance
    description: 캐시 히트 시 3초 이내, 초회 호출 포함 15초 이내 응답
    weight: 0.10

exit_conditions:
  - name: v0.2.0 사용성 개선
    description: PRD 7개 기능 완료 + 사용자 테스트 통과
    criteria: AC-01~AC-05 전체 통과
  - name: v0.3.0 데이터 확장
    description: 부동산 데이터 + 가중치 + 지역 확장 아키텍처 완료
    criteria: AC-10, AC-11, AC-20, AC-30, AC-41, AC-42 전체 통과
  - name: v0.4.0 전국 확장
    description: 대시보드 + 전국 확장 + Food4Rhino 배포 완료
    criteria: AC-21, AC-31, AC-40 전체 통과
  - name: v0.5.0 시계열
    description: 시계열 + 환경 데이터 완료
    criteria: AC-22, AC-50 전체 통과
  - name: v0.6.0 원스톱 달성
    description: 생활 인프라 데이터 완료로 대지 분석 원스톱 비전 달성
    criteria: AC-51 통과 + 전체 evaluation_principles 충족

